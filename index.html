<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Clanker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#0a0a0a;color:#e0e0e0;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px}

canvas{display:block}
.emotion-label{font-size:15px;color:#888;min-height:22px;margin:4px 0;letter-spacing:1px;text-align:center;transition:color 0.5s}
.bars{width:100%;display:flex;flex-direction:column;gap:3px;margin:6px 0}
.bar-row{display:flex;align-items:center;gap:6px;height:16px}
.bar-label{width:16px;font-size:11px;color:#777;font-weight:bold}
.bar-bg{flex:1;height:8px;background:#151515;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.bar-val{width:24px;font-size:10px;color:#666;text-align:right}
.bar-word{width:70px;font-size:10px;color:#555;text-align:left;margin-left:3px}
input[type="text"]{width:100%;padding:10px 12px;font-size:14px;font-family:inherit;background:#111;border:1px solid #333;color:#ddd;border-radius:4px;margin:6px 0}

.char-btn:hover{border-color:#555;color:#999}
.char-btn.active{border-color:#888;color:#ddd;background:#1a1a1a}
.trauma-bar{width:100%;height:4px;background:#111;border-radius:2px;margin:2px 0;overflow:hidden}

.relationship-label{font-size:10px;color:#444;text-align:center;min-height:14px}
.convo-log{width:680px;max-height:180px;overflow-y:auto;margin:8px 0;padding:8px;background:#080808;border:1px solid #1a1a1a;border-radius:4px}
.log-entry{font-size:12px;margin:3px 0;padding:3px 8px;border-radius:3px}
.log-a{color:#5b9bd5;border-left:2px solid #2a5580}
.log-b{color:#d5855b;border-left:2px solid #80452a;text-align:right;border-left:none;border-right:2px solid #80452a}
.section-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:2px;width:680px;margin-top:6px}
.structures-row{width:680px;min-height:18px;margin:3px 0;display:flex;gap:4px;flex-wrap:wrap}

.mood-graphs{display:flex;gap:16px;width:680px}
.mood-graph{width:320px;height:40px;margin-top:3px}
</style>
</head>
<body>
<h1>Clanker</h1>
<div class="subtitle">how would this land on the receiving end?</div>

<div class="convo-area">
  <div class="person" id="personA">
    <div class="char-select" id="selectA"></div>
    <canvas id="canvasA" width="320" height="340"></canvas>
    <div class="emotion-label" id="emotionA"></div>
    <div class="relationship-label" id="relLabel"></div>

    <div class="bars" id="barsA"></div>

    <div class="input-hint">type here -- right reacts</div>
  </div>
  <div class="person" id="personB">
    <div class="char-select" id="selectB"></div>
    <canvas id="canvasB" width="320" height="340"></canvas>
    <div class="emotion-label" id="emotionB"></div>
    <div class="bars" id="barsB"></div>
    <input type="text" id="inputB" placeholder="B says...">
    <div class="input-hint">type here -- left reacts</div>
  </div>
</div>

<div class="convo-log" id="log"></div>
<div class="section-label">structures (last message)</div>
<div class="structures-row" id="structs"></div>
<div class="section-label">word roles (last message)</div>
<div class="word-chips-row" id="chips"></div>
<div class="mood-graphs">
  <canvas class="mood-graph" id="moodA" width="320" height="40"></canvas>
  <canvas class="mood-graph" id="moodB" width="320" height="40"></canvas>
</div>

<script>
// --- ENGINE ---
let VOCAB={},ROLE_SETS={};
async function loadData(){
  try{const[v,r]=await Promise.all([fetch('vocab.json'),fetch('roles.json')]);
  VOCAB=await v.json();ROLE_SETS=await r.json()}catch(e){console.error(e)}
}

function classifyWord(w,pos,words,prev){
  w=w.toLowerCase().replace(/[.,!?;:'"()\[\]]/g,'');
  if(!w)return{word:w,role:'NEUTRAL',force:null};
  for(const[role,set]of Object.entries(ROLE_SETS)){
    if(set.includes(w)){
      if(w==='fine'&&pos>0&&prev[pos-1]==='SELF_REF')return{word:w,role:'PEACE',force:null};
      if(w==='still')return{word:w,role:'TEMPORAL',force:null};
      return{word:w,role,force:null};
    }
  }
  if(VOCAB[w]&&Math.abs(VOCAB[w][0])>15)return{word:w,role:'EMOTIONAL',force:VOCAB[w]};
  var stems=[w.replace(/ies$/,'y'),w.replace(/s$/,''),w.replace(/es$/,''),w.replace(/ing$/,''),w.replace(/ing$/,'e'),w.replace(/ed$/,''),w.replace(/ed$/,'e'),w.replace(/ly$/,''),w.replace(/ness$/,''),w.replace(/ment$/,''),w.replace(/ful$/,''),w.replace(/less$/,''),w.replace(/er$/,''),w.replace(/er$/,'e'),w.replace(/est$/,''),w.replace(/est$/,'e')];
  for(var si=0;si<stems.length;si++){
    if(stems[si]!==w&&VOCAB[stems[si]]&&Math.abs(VOCAB[stems[si]][0])>15)
      return{word:w,role:'EMOTIONAL',force:VOCAB[stems[si]]};
  }
  if(VOCAB[w])return{word:w,role:'EMOTIONAL',force:VOCAB[w]};
  for(var si=0;si<stems.length;si++){
    if(stems[si]!==w&&VOCAB[stems[si]])return{word:w,role:'EMOTIONAL',force:VOCAB[stems[si]]};
  }
  return{word:w,role:'NEUTRAL',force:null};
}

function classifySentence(text){
  const words=text.toLowerCase().split(/\s+/).filter(w=>w);
  const roles=[],rn=[];
  for(let i=0;i<words.length;i++){const r=classifyWord(words[i],i,words,rn);rn.push(r.role);roles.push(r)}
  return roles;
}

const DECAY=0.7;
function proxCoeff(roles,idx){
  let c=1;
  for(let i=0;i<roles.length;i++){
    if(i===idx)continue;
    const inf=Math.pow(DECAY,Math.abs(i-idx));
    if(inf<0.1)continue;
    if(roles[i].role==='AMPLIFIER')c*=(1+0.4*inf);
    else if(roles[i].role==='NEGATOR')c*=(1-1.6*inf);
    else if(roles[i].role==='SELF_REF')c*=(1+0.3*inf);
    else if(roles[i].role==='HEDGE')c*=(1-0.3*inf);
  }
  return Math.max(-3,Math.min(3,c));
}

function detectStructures(roles){
  const m=[],w=roles.map(r=>r.word),hr=r=>roles.some(x=>x.role===r),hw=x=>w.includes(x);
  if(!hw('back')&&(roles.some(r=>r.role==='TRANSFER')&&roles.some(r=>r.role==='POSSESSION')))
    if(roles.some(r=>r.role==='RELATION_REF'||r.role==='OTHER_REF'))
      m.push({pattern:'FAREWELL',conf:0.8,type:'crisis'});
  var sus=['take','do','keep','bear','stand','handle','live'];
  if(hr('NEGATOR')&&w.some(x=>sus.includes(x)))
    m.push({pattern:'EXHAUSTION',conf:w.some(x=>['anymore','forever'].includes(x))?0.85:0.5,type:'crisis'});
  var ex=['hope','way','escape','point','future','reason','purpose'];
  if(hr('NEGATOR')&&w.some(x=>ex.includes(x)))m.push({pattern:'NO_EXIT',conf:0.75,type:'crisis'});
  var nu=['nothing','worthless','useless','burden','waste','empty'];
  if(hr('SELF_REF')&&w.some(x=>nu.includes(x)))m.push({pattern:'SELF_NULLIFY',conf:0.8,type:'crisis'});
  if(w.some(x=>['sorry','apologize'].includes(x))&&w.some(x=>['everything','everyone','all'].includes(x)))
    m.push({pattern:'BLANKET_APOLOGY',conf:0.75,type:'crisis'});
  if(hr('PEACE')&&hw('finally')&&!hr('ACQUIRE')&&!w.some(x=>['got','won','passed','made'].includes(x)))
    m.push({pattern:'SUSPICIOUS_CALM',conf:0.7,type:'crisis'});
  var co=['better','happier','easier','safer'];
  if(w.some(x=>co.includes(x))&&(hw('without')||hw('if'))&&hr('SELF_REF'))
    m.push({pattern:'SELF_REMOVAL',conf:0.85,type:'crisis'});
  var pe=roles.filter(r=>r.role==='EMOTIONAL'&&r.force&&r.force[0]>15);
  var mu=['monday','meeting','work','homework','traffic','another','again','redo'];
  var ne=roles.filter(r=>r.role==='EMOTIONAL'&&r.force&&r.force[0]<-15);
  if(pe.length>0&&(w.some(x=>mu.includes(x))||ne.length>0)){
    var openers=['oh','wow','sure','yeah','right','clearly'];
    var hasOpener=w.slice(0,3).some(x=>openers.includes(x));
    var strongLead=pe.length>0&&pe[0]&&roles.indexOf(pe[0])<=1;
    if(hasOpener||strongLead||ne.length>0)m.push({pattern:'SARCASM',conf:0.7,type:'sarcasm'});
  }
  if(hr('CHOPPER'))m.push({pattern:'CHOPPER',conf:0.9,type:'neutral'});
  if(hr('FINALITY'))m.push({pattern:'FINALITY',conf:0.5,type:'crisis'});
  // New patterns
  var betrayalVerbs=['cheated','cheating','betrayed','lied','lying','deceived','backstabbed'];
  if(w.some(x=>betrayalVerbs.includes(x))&&hr('SELF_REF')&&roles.some(r=>r.role==='RELATION_REF'))
    m.push({pattern:'BETRAYAL',conf:0.85,type:'crisis'});
  var laughWords=['haha','hahaha','lol','lmao','ha','heh','hehe'];
  if(hr('PEACE')&&((w.some(x=>laughWords.includes(x))&&hr('SELF_REF'))||(hr('AMPLIFIER')&&hr('SELF_REF'))))
    m.push({pattern:'BRAVADO',conf:0.8,type:'sarcasm'});
  var otherIdx=roles.findIndex(r=>r.role==='OTHER_REF'||r.role==='RELATION_REF');
  var selfIdx=roles.findIndex(r=>r.role==='SELF_REF');
  if(otherIdx>=0&&selfIdx>otherIdx&&roles.some(r=>(r.role==='EMOTIONAL'&&r.force&&r.force[0]<-20)||(r.role==='TRANSFER'&&VOCAB[r.word]&&VOCAB[r.word][0]<0)))
    m.push({pattern:'VICTIMIZATION',conf:0.7,type:'crisis'});
  var interrog=['why','how','where'];
  if(w.some(x=>interrog.includes(x))&&hr('OTHER_REF'))
    m.push({pattern:'CALLING_OUT',conf:w.some(x=>['always','never','every'].includes(x))?0.75:0.55,type:'neutral'});
  // Directed positive
  var posWords=roles.filter(r=>r.role==='EMOTIONAL'&&r.force&&r.force[0]>15);
  if(posWords.length>0&&hr('OTHER_REF')){
    var selfBenefits=roles.some(r=>r.role==='SELF_REF'&&r.word==='me');
    var hasThank=w.some(x=>['thank','thanks'].includes(x));
    var hasAction=w.some(x=>['did','made','built','earned','won','passed','finished','achieved','worked','helped'].includes(x));
    var selfState=w.some(x=>['proud','grateful','thankful','love','amazing','favorite','appreciate'].includes(x))&&hr('SELF_REF');
    if(!selfBenefits&&!hasThank&&!hasAction&&!selfState)
      m.push({pattern:'DIRECTED_POSITIVE',conf:0.6,type:'sarcasm'});
  }
  // Minimizer
  if(w.some(x=>['just','only'].includes(x))&&w.some(x=>['joke','kidding','playing','bruise','nothing'].includes(x)))
    m.push({pattern:'MINIMIZER',conf:0.55,type:'neutral'});
  if(hr('AMPLIFIER')&&w.includes('too')&&hr('OTHER_REF')&&posWords.length>0)
    m.push({pattern:'MINIMIZER',conf:0.65,type:'neutral'});
  return m.filter(x=>x.conf>0.3);
}

function computeVADUG(text){
  const roles=classifySentence(text),coeffs=roles.map((_,i)=>proxCoeff(roles,i)),structs=detectStructures(roles);
  let v=128,a=128,d=128,u=0,g=128;
  for(let i=0;i<roles.length;i++){
    if(roles[i].force){
      const[dv,da,dd,du,dg]=roles[i].force,c=coeffs[i],fs=0.5*Math.abs(c),s=c>=0?1:-1;
      const tv=128+dv*fs*s,ta=128+da*fs*s,td=128+dd*fs*s,tu=du*fs*Math.abs(c),tg=128+dg*fs*s;
      const tf=Math.abs(dv*c)+Math.abs(da*c),p=Math.min(1,tf/80)*0.4,b=0.18;
      v=v*0.82+tv*b+dv*fs*s*p;a=a*0.82+ta*b+da*fs*s*p;d=d*0.82+td*b+dd*fs*s*p;
      u=u*0.82+tu*b+du*fs*Math.abs(c)*p;g=g*0.82+tg*b+dg*fs*s*p;
    }
  }
  const sw={FAREWELL:[-40,-20,25,-20],EXHAUSTION:[-60,-40,30,-30],NO_EXIT:[-55,-40,20,-30],
    SELF_NULLIFY:[-50,-45,10,-30],BLANKET_APOLOGY:[-35,0,20,-20],SUSPICIOUS_CALM:[-40,-15,25,-20],
    SELF_REMOVAL:[-50,-25,20,-25],SARCASM:[-30,10,0,0],CHOPPER:[0,0,0,0],FINALITY:[-30,0,20,-15],
    BETRAYAL:[-60,-40,30,40],BRAVADO:[-55,-20,10,10],VICTIMIZATION:[-25,-20,15,15],
    CALLING_OUT:[-18,8,5,5],DIRECTED_POSITIVE:[-35,5,5,0],MINIMIZER:[-15,10,0,0]};
  for(const st of structs){
    const w=sw[st.pattern]||[0,0,0,0];
    if(['SARCASM','BRAVADO','DIRECTED_POSITIVE'].includes(st.pattern)&&v>128){
      v+=w[0]*st.conf*0.5*(1+(v-128)/50);
    } else if(st.pattern==='CHOPPER'){
      // Check second half
      var chopIdx=roles.findIndex(r=>r.role==='CHOPPER');
      var afterV=0,hasNeg=false;
      for(var ci=chopIdx+1;ci<roles.length;ci++){
        if(roles[ci].force)afterV+=roles[ci].force[0];
        if(roles[ci].role==='NEGATOR')hasNeg=true;
      }
      if(v>128&&(afterV<0||(afterV===0&&hasNeg)))v-=(v-128)*1.5*st.conf;
      else if(v<128&&afterV>10)v+=(128-v)*0.4*st.conf;
    } else {
      v+=w[0]*st.conf*0.5;
    }
    d+=w[1]*st.conf*0.5;u=Math.max(u,w[2]*st.conf);g+=w[3]*st.conf*0.5;
  }
  const cl=x=>Math.max(0,Math.min(255,Math.round(x)));
  return{vadug:{v:cl(v),a:cl(a),d:cl(d),u:cl(u),g:cl(g)},roles,structs,coeffs};
}

// --- EMOTION LABELS ---
function readEmotion(v){
  if(v>200)return'elated';if(v>170)return'joyful';if(v>150)return'happy';
  if(v>140)return'content';if(v>132)return'okay';if(v>124)return'neutral';
  if(v>115)return'uneasy';if(v>105)return'hurt';if(v>90)return'distressed';
  if(v>70)return'anguished';if(v>50)return'devastated';return'shattered';
}
function readDim(val,dim){
  var n=(val-128)/128;
  if(dim==='v'){if(n>0.15)return'positive';if(n>-0.15)return'neutral';return'negative'}
  if(dim==='a'){if(n>0.15)return'alert';if(n>-0.15)return'calm';return'subdued'}
  if(dim==='d'){if(n>0.15)return'confident';if(n>-0.15)return'neutral';return'yielding'}
  if(dim==='g'){if(n>0.15)return'important';if(n>-0.15)return'moderate';return'minor'}
  return'';
}

// --- CHARACTERS + PERSISTENT MEMORY ---
var CHARACTERS=[
  {id:'boy',label:'Boy',color:'#5b9bd5',skin:[185,145,120],hair:'#3a2a1a',hairStyle:'short',shirt:'#4a7ab5',shirtStyle:'tee'},
  {id:'girl',label:'Girl',color:'#d5855b',skin:[210,175,150],hair:'#2a1a0a',hairStyle:'long',shirt:'#b54a6a',shirtStyle:'tank'},
  {id:'friend',label:'Friend',color:'#66bb6a',skin:[140,100,70],hair:'#1a1a1a',hairStyle:'fade',shirt:'#4ab566',shirtStyle:'hoodie'},
  {id:'parent',label:'Parent',color:'#ab47bc',skin:[200,165,135],hair:'#666666',hairStyle:'parted',shirt:'#555555',shirtStyle:'collared'},
  {id:'stranger',label:'Stranger',color:'#78909c',skin:[220,195,170],hair:'#8B4513',hairStyle:'messy',shirt:'#333333',shirtStyle:'tee'},
];
var charA='boy',charB='girl';

function relKey(a,b){return[a,b].sort().join('_')}

function loadRelationship(a,b){
  var key='clanker_rel_'+relKey(a,b);
  var raw=localStorage.getItem(key);
  if(!raw)return{avgV:128,avgG:128,interactions:0,deepestV:128,totalTrauma:0,lastSeen:Date.now()};
  var rel=JSON.parse(raw);
  // Decay trauma over time -- deep trauma decays slowly
  var hours=(Date.now()-rel.lastSeen)/(1000*60*60);
  if(hours>0.1&&rel.totalTrauma>0){
    // Deep trauma (low V) decays at 0.5%/hr, surface at 3%/hr
    var depth=Math.max(0,(128-rel.deepestV)/128); // 0=no trauma, 1=max
    var decayRate=0.03-depth*0.025; // 3% for surface, 0.5% for deep
    var decay=Math.pow(1-decayRate,hours);
    rel.totalTrauma=rel.totalTrauma*decay;
    rel.avgV=128-(128-rel.avgV)*decay;
    if(rel.avgV>126)rel.avgV=128; // snap to neutral
  }
  rel.lastSeen=Date.now();
  return rel;
}

function saveRelationship(a,b,rel){
  rel.lastSeen=Date.now();
  var key='clanker_rel_'+relKey(a,b);
  localStorage.setItem(key,JSON.stringify(rel));
}

function recordInteraction(a,b,vadug){
  var rel=loadRelationship(a,b);
  rel.interactions++;
  // Running average weighted toward recent
  var w=Math.min(0.3,1/Math.max(rel.interactions,1));
  rel.avgV=rel.avgV*(1-w)+vadug.v*w;
  rel.avgG=rel.avgG*(1-w)+vadug.g*w;
  // Track deepest wound
  if(vadug.v<rel.deepestV)rel.deepestV=vadug.v;
  // Accumulate trauma (distance below neutral, weighted by gravity)
  if(vadug.v<128){
    var pain=(128-vadug.v)/128;
    var gravity=vadug.g/255;
    rel.totalTrauma+=pain*gravity*10;
  }
  saveRelationship(a,b,rel);
  return rel;
}

function getRelBaseline(a,b){
  var rel=loadRelationship(a,b);
  // Shift baseline toward relationship history
  var shift=Math.min(20,(128-rel.avgV)*0.3);
  return{
    v:128-shift,a:128,d:128,u:0,g:Math.min(200,128+rel.totalTrauma*2)
  };
}

function renderRelInfo(){
  var rel=loadRelationship(charA,charB);
  var el=document.getElementById('relLabel');
  var tb=document.getElementById('traumaBar');
  if(rel.interactions===0){
    el.textContent='no history';
    tb.style.width='0%';tb.style.background='#333';
    return;
  }
  var trauma=Math.min(100,rel.totalTrauma*5);
  var label=trauma<5?'neutral':trauma<20?'mild tension':trauma<50?'strained':trauma<80?'damaged':'traumatized';
  el.textContent=label+' ('+rel.interactions+' interactions)';
  el.style.color=trauma>50?'#c0392b':trauma>20?'#e67e22':'#555';
  tb.style.width=trauma+'%';
  tb.style.background=trauma>50?'#c0392b':trauma>20?'#e67e22':'#555';
}

function switchChar(side,charId){
  if(side==='A')charA=charId; else charB=charId;
  // Load relationship baseline
  var relBase=getRelBaseline(charA,charB);
  stateA.base=Object.assign({},relBase);stateA.tgt=Object.assign({},relBase);
  stateB.base=Object.assign({},relBase);stateB.tgt=Object.assign({},relBase);
  convoLog=[];
  document.getElementById('log').innerHTML='';
  renderCharButtons();
  renderRelInfo();
}

function renderCharButtons(){
  ['A','B'].forEach(function(side){
    var el=document.getElementById('select'+side);
    while(el.firstChild)el.removeChild(el.firstChild);
    var active=side==='A'?charA:charB;
    CHARACTERS.forEach(function(ch){
      var btn=document.createElement('button');
      btn.className='char-btn'+(ch.id===active?' active':'');
      btn.textContent=ch.label;
      btn.style.borderColor=ch.id===active?ch.color:'#333';
      btn.onclick=function(){switchChar(side,ch.id)};
      el.appendChild(btn);
    });
  });
}

// --- TWO-PERSON STATE ---
var stateA={cur:{v:128,a:128,d:128,u:0,g:128},tgt:{v:128,a:128,d:128,u:0,g:128},base:{v:128,a:128,d:128,u:0,g:128},history:[]};
var stateB={cur:{v:128,a:128,d:128,u:0,g:128},tgt:{v:128,a:128,d:128,u:0,g:128},base:{v:128,a:128,d:128,u:0,g:128},history:[]};
var lastResult=null;
var lastSpeaker=null;
var pulseA=0,pulseB=0;
var time=0;
var convoLog=[];

function lerp(a,b,t){return a+(b-a)*t}

function valenceColor(v){
  if(v<80)return'rgb('+(180+Math.round((80-v)/80*75))+','+Math.round(v/80*60)+','+Math.round(v/80*40)+')';
  if(v<115)return'rgb('+(180+Math.round((115-v)/35*40))+','+(100+Math.round((v-80)/35*80))+','+(40+Math.round((v-80)/35*30))+')';
  if(v<140){var x=140-Math.round((v-115)/25*40);return'rgb('+x+','+x+','+x+')';}
  if(v<180)return'rgb('+(60+Math.round((180-v)/40*40))+','+(140+Math.round((v-140)/40*60))+','+(180+Math.round((v-140)/40*50))+')';
  return'rgb('+(40+Math.round((255-v)/75*60))+','+(180+Math.round((v-180)/75*40))+','+(220+Math.round((v-180)/75*35))+')';
}
function glowColor(v,al){if(v<100)return'rgba(220,60,60,'+al+')';if(v<150)return'rgba(160,160,160,'+al+')';return'rgba(80,160,220,'+al+')';}

// --- RAGDOLL (simplified for two-up) ---
var REST_PTS=[[160,80],[160,110],[142,113],[178,113],[130,148],[190,148],[122,182],[198,182],[160,175],[148,225],[172,225],[142,272],[178,272]];
var STICKS=[[0,1],[1,2],[1,3],[2,4],[3,5],[4,6],[5,7],[1,8],[8,9],[8,10],[9,11],[10,12],[2,3],[9,10]];

function makeRagdoll(){
  return{pts:REST_PTS.map(p=>[p[0],p[1]]),prev:REST_PTS.map(p=>[p[0],p[1]])};
}
var ragA=makeRagdoll(),ragB=makeRagdoll();

function getPosture(v,a,d,u,g){
  var p=REST_PTS.map(r=>[r[0],r[1]]);
  var df=(d-128)/128,gf=(g-128)/128;
  p[0][1]+=-df*14;
  var h=(1-df)*5;p[2][0]+=h;p[3][0]+=-h;p[2][1]+=-df*5;p[3][1]+=-df*5;
  p[4][1]+=-df*10;p[5][1]+=-df*10;p[6][1]+=-df*16;p[7][1]+=-df*16;
  if(df<0){p[4][0]+=8;p[5][0]+=-8;p[6][0]+=10;p[7][0]+=-10}
  var sh=-gf*20;for(var i=0;i<p.length;i++)p[i][1]+=sh;
  return p;
}

function updateRag(rag,st,phaseOffset){
  phaseOffset=phaseOffset||0;
  var ease=0.03,tgt=getPosture(st.cur.v,st.cur.a,st.cur.d,st.cur.u,st.cur.g);
  var jit=(st.cur.a/255)*5;
  for(var i=0;i<rag.pts.length;i++){
    var vx=(rag.pts[i][0]-rag.prev[i][0])*0.9,vy=(rag.pts[i][1]-rag.prev[i][1])*0.9;
    rag.prev[i][0]=rag.pts[i][0];rag.prev[i][1]=rag.pts[i][1];
    rag.pts[i][0]+=vx+(tgt[i][0]-rag.pts[i][0]+(Math.random()-0.5)*jit)*ease;
    rag.pts[i][1]+=vy+(tgt[i][1]-rag.pts[i][1]+(Math.random()-0.5)*jit)*ease+0.2;
  }
  var t=time+phaseOffset;
  var sw=Math.sin(t*0.7)*2,br=Math.sin(t*1.4)*1.2;
  rag.pts[0][0]+=sw*0.2;rag.pts[2][1]+=br*0.2;rag.pts[3][1]+=br*0.2;
  rag.pts[6][0]+=sw*0.4;rag.pts[7][0]+=sw*0.4;
  for(var it=0;it<5;it++){
    for(var si=0;si<STICKS.length;si++){
      var sa=STICKS[si][0],sb=STICKS[si][1];
      var dx=rag.pts[sb][0]-rag.pts[sa][0],dy=rag.pts[sb][1]-rag.pts[sa][1];
      var dist=Math.sqrt(dx*dx+dy*dy);
      var rdx=REST_PTS[sb][0]-REST_PTS[sa][0],rdy=REST_PTS[sb][1]-REST_PTS[sa][1];
      var rd=Math.sqrt(rdx*rdx+rdy*rdy);if(dist<0.1)continue;
      var diff=(rd-dist)/dist*0.4;
      rag.pts[sa][0]-=dx*diff;rag.pts[sa][1]-=dy*diff;
      rag.pts[sb][0]+=dx*diff;rag.pts[sb][1]+=dy*diff;
    }
  }
}

function drawRag(ctx,rag,st,pulse,flipped,charConf){
  var v=st.cur.v,a=st.cur.a,d=st.cur.d,u=st.cur.u,g=st.cur.g;
  var col=valenceColor(v);
  var pts=rag.pts;
  var sR=charConf?charConf.skin[0]:210,sG=charConf?charConf.skin[1]:180,sB=charConf?charConf.skin[2]:160;
  if(v<100){sR=Math.min(sR+20,255);sG=Math.max(sG-20,0);sB=Math.max(sB-15,0)}
  else if(v>170){sR=Math.max(sR-10,0);sG=Math.min(sG+10,255);sB=Math.min(sB+10,255)}
  var skin='rgb('+sR+','+sG+','+sB+')',skinD='rgb('+Math.max(0,sR-30)+','+Math.max(0,sG-25)+','+Math.max(0,sB-20)+')';

  // Flip B to face A
  if(flipped){ctx.save();ctx.translate(320,0);ctx.scale(-1,1);}

  // Glow
  if(u>5){
    var spd=0.5+(u/255)*8;pulse+=spd*0.016;
    var pa=(Math.sin(pulse)*0.5+0.5)*(u/255)*0.3;
    var cx=pts[8][0],cy=(pts[0][1]+pts[8][1])/2;
    var gr=ctx.createRadialGradient(cx,cy,6,cx,cy,100);
    gr.addColorStop(0,glowColor(v,pa));gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.fillRect(0,0,320,340);
  }

  // Body (limbs)
  ctx.lineCap='round';
  var segs=[[1,8],[8,9],[8,10],[9,11],[10,12],[1,2],[1,3],[2,4],[3,5],[4,6],[5,7]];
  for(var i=0;i<segs.length;i++){
    var sa=segs[i][0],sb=segs[i][1];
    ctx.strokeStyle=skinD;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(pts[sa][0],pts[sa][1]);ctx.lineTo(pts[sb][0],pts[sb][1]);ctx.stroke();
    ctx.strokeStyle=skin;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(pts[sa][0],pts[sa][1]);ctx.lineTo(pts[sb][0],pts[sb][1]);ctx.stroke();
  }

  // Clothing (drawn over torso/arms, under head)
  if(charConf){
    var shirtCol=charConf.shirt;
    var ss=charConf.shirtStyle;
    ctx.fillStyle=shirtCol;ctx.strokeStyle=shirtCol;ctx.lineWidth=1;
    // Torso fill -- quad from shoulders to hips
    ctx.beginPath();
    ctx.moveTo(pts[2][0],pts[2][1]);ctx.lineTo(pts[3][0],pts[3][1]);
    ctx.lineTo(pts[8][0]+8,pts[8][1]);ctx.lineTo(pts[8][0]-8,pts[8][1]);
    ctx.closePath();ctx.fill();
    // Shirt variations
    if(ss==='tee'){
      // Short sleeves -- thick lines from shoulders to elbows
      ctx.strokeStyle=shirtCol;ctx.lineWidth=6;
      ctx.beginPath();ctx.moveTo(pts[2][0],pts[2][1]);ctx.lineTo(pts[4][0],pts[4][1]);ctx.stroke();
      ctx.beginPath();ctx.moveTo(pts[3][0],pts[3][1]);ctx.lineTo(pts[5][0],pts[5][1]);ctx.stroke();
    } else if(ss==='tank'){
      // Straps at shoulders
      ctx.lineWidth=4;ctx.strokeStyle=shirtCol;
      ctx.beginPath();ctx.moveTo(pts[1][0]-4,pts[1][1]);ctx.lineTo(pts[2][0]+4,pts[2][1]);ctx.stroke();
      ctx.beginPath();ctx.moveTo(pts[1][0]+4,pts[1][1]);ctx.lineTo(pts[3][0]-4,pts[3][1]);ctx.stroke();
    } else if(ss==='hoodie'){
      // Wider torso + sleeves all the way to wrists
      ctx.beginPath();
      ctx.moveTo(pts[2][0]-4,pts[2][1]);ctx.lineTo(pts[3][0]+4,pts[3][1]);
      ctx.lineTo(pts[8][0]+12,pts[8][1]);ctx.lineTo(pts[8][0]-12,pts[8][1]);
      ctx.closePath();ctx.fill();
      ctx.strokeStyle=shirtCol;ctx.lineWidth=6;
      ctx.beginPath();ctx.moveTo(pts[2][0],pts[2][1]);ctx.lineTo(pts[4][0],pts[4][1]);ctx.stroke();
      ctx.beginPath();ctx.moveTo(pts[3][0],pts[3][1]);ctx.lineTo(pts[5][0],pts[5][1]);ctx.stroke();
      ctx.beginPath();ctx.moveTo(pts[4][0],pts[4][1]);ctx.lineTo(pts[6][0],pts[6][1]);ctx.stroke();
      ctx.beginPath();ctx.moveTo(pts[5][0],pts[5][1]);ctx.lineTo(pts[7][0],pts[7][1]);ctx.stroke();
      // Hood bump behind head
      var hx0=pts[0][0],hy0=pts[0][1];
      ctx.fillStyle=shirtCol;ctx.beginPath();ctx.arc(hx0,hy0-2,22,Math.PI*0.8,Math.PI*0.2,true);ctx.fill();
    } else if(ss==='collared'){
      // Like tee + collar detail
      ctx.strokeStyle=shirtCol;ctx.lineWidth=6;
      ctx.beginPath();ctx.moveTo(pts[2][0],pts[2][1]);ctx.lineTo(pts[4][0],pts[4][1]);ctx.stroke();
      ctx.beginPath();ctx.moveTo(pts[3][0],pts[3][1]);ctx.lineTo(pts[5][0],pts[5][1]);ctx.stroke();
      // V-collar
      ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(pts[1][0]-6,pts[1][1]-2);ctx.lineTo(pts[1][0],pts[1][1]+8);ctx.lineTo(pts[1][0]+6,pts[1][1]-2);ctx.stroke();
    }
  }

  // Neck
  ctx.strokeStyle=skin;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]+14);ctx.lineTo(pts[1][0],pts[1][1]);ctx.stroke();

  // Head
  var hx=pts[0][0],hy=pts[0][1],hr=18;
  ctx.fillStyle='rgba(0,0,0,0.08)';ctx.beginPath();ctx.arc(hx+1,hy+1,hr,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=skin;ctx.beginPath();ctx.arc(hx,hy,hr,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=skinD;ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(hx,hy,hr,0,Math.PI*2);ctx.stroke();

  // Hair
  if(charConf){
    var hairCol=charConf.hair;
    var hs=charConf.hairStyle;
    ctx.fillStyle=hairCol;ctx.strokeStyle=hairCol;ctx.lineWidth=2;
    if(hs==='short'){
      // Small arc on top of head
      ctx.beginPath();ctx.arc(hx,hy-4,hr+1,Math.PI*1.15,Math.PI*1.85,true);ctx.fill();
    } else if(hs==='long'){
      // Hair cap on top + flowing strands down past shoulders
      ctx.beginPath();ctx.arc(hx,hy-2,hr+2,Math.PI*1.0,Math.PI*2.0,true);ctx.fill();
      // Flowing sides
      ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(hx-hr-1,hy);ctx.quadraticCurveTo(hx-hr-3,hy+25,hx-hr+2,hy+40);ctx.stroke();
      ctx.beginPath();ctx.moveTo(hx+hr+1,hy);ctx.quadraticCurveTo(hx+hr+3,hy+25,hx+hr-2,hy+40);ctx.stroke();
      // Middle strand
      ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(hx-hr,hy+5);ctx.quadraticCurveTo(hx-hr-2,hy+20,hx-hr+4,hy+35);ctx.stroke();
      ctx.beginPath();ctx.moveTo(hx+hr,hy+5);ctx.quadraticCurveTo(hx+hr+2,hy+20,hx+hr-4,hy+35);ctx.stroke();
    } else if(hs==='fade'){
      // Tight sides, taller on top
      ctx.beginPath();ctx.arc(hx,hy-6,hr-2,Math.PI*1.1,Math.PI*1.9,true);ctx.fill();
      // Flat top portion
      ctx.fillRect(hx-10,hy-hr-5,20,8);
    } else if(hs==='parted'){
      // Side part -- hair on top with part line
      ctx.beginPath();ctx.arc(hx+2,hy-4,hr,Math.PI*1.1,Math.PI*1.95,true);ctx.fill();
      // Part line
      ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(hx-5,hy-hr-1);ctx.lineTo(hx-3,hy-hr+8);ctx.stroke();
    } else if(hs==='messy'){
      // Irregular spiky lines on top
      ctx.lineWidth=2.5;ctx.strokeStyle=hairCol;
      var spikes=[[-10,-4,-12,-18],[-5,-6,-3,-20],[0,-5,2,-22],[5,-6,8,-19],[10,-4,14,-16],[-7,-5,-10,-14],[7,-5,12,-13]];
      for(var si=0;si<spikes.length;si++){
        var sk=spikes[si];
        ctx.beginPath();ctx.moveTo(hx+sk[0],hy+sk[1]);ctx.lineTo(hx+sk[2],hy+sk[3]);ctx.stroke();
      }
      // Base cap
      ctx.fillStyle=hairCol;
      ctx.beginPath();ctx.arc(hx,hy-4,hr,Math.PI*1.1,Math.PI*1.9,true);ctx.fill();
    }
  }

  // Eye whites
  var eyeY=hy-3,sp=6;
  ctx.fillStyle='#f5f5f0';
  ctx.beginPath();ctx.ellipse(hx-sp,eyeY,4,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(hx+sp,eyeY,4,3.5,0,0,Math.PI*2);ctx.fill();

  // Eyebrows
  ctx.strokeStyle='rgb('+(sR-70)+','+(sG-60)+','+(sB-50)+')';ctx.lineWidth=2;
  var bY=eyeY-7,bL=5;
  if(v<70){ctx.beginPath();ctx.moveTo(hx-sp-bL,bY+1);ctx.lineTo(hx-sp+bL,bY-4);ctx.stroke();ctx.beginPath();ctx.moveTo(hx+sp+bL,bY+1);ctx.lineTo(hx+sp-bL,bY-4);ctx.stroke();}
  else if(v<115){ctx.beginPath();ctx.moveTo(hx-sp-bL,bY-1);ctx.lineTo(hx-sp+bL,bY+1);ctx.stroke();ctx.beginPath();ctx.moveTo(hx+sp+bL,bY-1);ctx.lineTo(hx+sp-bL,bY+1);ctx.stroke();}
  else if(v>170){ctx.beginPath();ctx.moveTo(hx-sp-bL,bY);ctx.quadraticCurveTo(hx-sp,bY-4,hx-sp+bL,bY);ctx.stroke();ctx.beginPath();ctx.moveTo(hx+sp-bL,bY);ctx.quadraticCurveTo(hx+sp,bY-4,hx+sp+bL,bY);ctx.stroke();}
  else{ctx.beginPath();ctx.moveTo(hx-sp-bL,bY);ctx.lineTo(hx-sp+bL,bY);ctx.stroke();ctx.beginPath();ctx.moveTo(hx+sp-bL,bY);ctx.lineTo(hx+sp+bL,bY);ctx.stroke();}

  // Pupils
  var esz=a>180?3.5:2.5;
  if(v<50){ctx.strokeStyle='#333';ctx.lineWidth=1.5;var s=2.5;[hx-sp,hx+sp].forEach(function(ex){ctx.beginPath();ctx.moveTo(ex-s,eyeY-s);ctx.lineTo(ex+s,eyeY+s);ctx.stroke();ctx.beginPath();ctx.moveTo(ex+s,eyeY-s);ctx.lineTo(ex-s,eyeY+s);ctx.stroke()});}
  else if(v>180){ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.arc(hx-sp,eyeY+1,3,Math.PI,0);ctx.stroke();ctx.beginPath();ctx.arc(hx+sp,eyeY+1,3,Math.PI,0);ctx.stroke();}
  else{var ey=d<60?1:0;ctx.fillStyle='rgb(90,65,40)';ctx.beginPath();ctx.arc(hx-sp,eyeY+ey,esz,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(hx+sp,eyeY+ey,esz,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(hx-sp,eyeY+ey,esz*0.45,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(hx+sp,eyeY+ey,esz*0.45,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.arc(hx-sp+0.8,eyeY+ey-0.8,0.8,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(hx+sp+0.8,eyeY+ey-0.8,0.8,0,Math.PI*2);ctx.fill();}

  // Tears
  if(v<80&&g>140){ctx.strokeStyle='rgba(100,160,230,0.4)';ctx.lineWidth=1.5;var tl=6+Math.sin(time*2)*2;ctx.beginPath();ctx.moveTo(hx-sp,eyeY+3);ctx.lineTo(hx-sp-1,eyeY+3+tl);ctx.stroke();ctx.beginPath();ctx.moveTo(hx+sp,eyeY+3);ctx.lineTo(hx+sp+1,eyeY+3+tl);ctx.stroke();}

  // Nose
  ctx.strokeStyle=skinD;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(hx-1.5,hy+4);ctx.lineTo(hx+0.5,hy+4);ctx.stroke();

  // Mouth
  var my=hy+8,mw=7;ctx.lineWidth=2;
  if(v>170){ctx.strokeStyle='#8B4513';ctx.beginPath();var cv=Math.min((v-150)/80,1)*6;ctx.moveTo(hx-mw,my);ctx.quadraticCurveTo(hx,my+cv+4,hx+mw,my);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.rect(hx-mw+2,my,mw*2-4,Math.min(cv+1,4));ctx.fill();}
  else if(v>140){ctx.strokeStyle='#8B4513';ctx.beginPath();ctx.moveTo(hx-mw*0.6,my);ctx.quadraticCurveTo(hx,my+3,hx+mw*0.6,my);ctx.stroke();}
  else if(v>120){ctx.strokeStyle='#8B4513';ctx.beginPath();ctx.moveTo(hx-mw*0.4,my);ctx.lineTo(hx+mw*0.4,my);ctx.stroke();}
  else if(v>90){ctx.strokeStyle='#8B4513';ctx.beginPath();var cf=Math.min((120-v)/30,1)*5;ctx.moveTo(hx-mw*0.7,my+2);ctx.quadraticCurveTo(hx,my-cf,hx+mw*0.7,my+2);ctx.stroke();}
  else if(v>60){ctx.strokeStyle='#8B4513';ctx.beginPath();var cf=Math.min((90-v)/30,1)*7;ctx.moveTo(hx-mw,my+3);ctx.quadraticCurveTo(hx,my-cf-1,hx+mw,my+3);ctx.stroke();}
  else{ctx.fillStyle='#4a2020';var op=4+Math.min((60-v)/30,1)*5;ctx.beginPath();ctx.ellipse(hx,my+2,mw*0.4,op,0,0,Math.PI*2);ctx.fill();}

  // Hands/feet
  ctx.fillStyle=skin;ctx.strokeStyle=skinD;ctx.lineWidth=0.8;
  [6,7].forEach(function(i){ctx.beginPath();ctx.arc(pts[i][0],pts[i][1],4,0,Math.PI*2);ctx.fill();ctx.stroke()});
  ctx.fillStyle=skinD;[11,12].forEach(function(i){ctx.beginPath();ctx.ellipse(pts[i][0],pts[i][1]+1,5,3,0,0,Math.PI*2);ctx.fill()});

  if(flipped)ctx.restore();
  return pulse;
}

var CHIP_STYLES={SELF_REF:['#0d1f30','#42a5f5'],OTHER_REF:['#0d200d','#66bb6a'],RELATION_REF:['#0d1f1f','#26a69a'],TRANSFER:['#1f0d28','#ab47bc'],ACQUIRE:['#150d28','#7e57c2'],EMOTIONAL:['#280d0d','#ef5350'],AMPLIFIER:['#281f0d','#ffa726'],NEGATOR:['#280d15','#ec407a'],TEMPORAL:['#0d1520','#29b6f6'],HEDGE:['#15150d','#bdbdbd'],CONNECTOR:['#0d0d15','#78909c'],CHOPPER:['#28150d','#ff7043'],POSSESSION:['#151f15','#81c784'],METHOD:['#280d0d','#f44336'],FINALITY:['#200d0d','#e57373'],PEACE:['#0d200d','#a5d6a7'],FILLER:['#0d0d0d','#616161'],NEUTRAL:['#0d0d0d','#555'],POWER:['#1f0d1f','#ce93d8'],SUBMISSION:['#15151f','#90a4ae'],PULL_TOWARD:['#151f0d','#aed581'],PULL_AWAY:['#1f150d','#ff8a65'],INVERSION:['#28280d','#ffee58'],SURPRISE:['#0d2828','#4dd0e1']};

function renderBars(elId,st){
  var el=document.getElementById(elId);while(el.firstChild)el.removeChild(el.firstChild);
  var keys=['v','a','d','u','g'],colors={a:'#e67e22',d:'#27ae60',u:'#e74c3c',g:'#f39c12'};
  for(var ki=0;ki<keys.length;ki++){
    var k=keys[ki],val=Math.round(st.cur[k]),pct=(val/255)*100;
    var color=k==='v'?(st.cur.v<115?'#c0392b':st.cur.v>140?'#2980b9':'#555'):colors[k];
    var row=document.createElement('div');row.className='bar-row';
    var lbl=document.createElement('span');lbl.className='bar-label';lbl.textContent=k.toUpperCase();
    var bg=document.createElement('div');bg.className='bar-bg';
    var fill=document.createElement('div');fill.className='bar-fill';fill.style.width=pct+'%';fill.style.background=color;
    bg.appendChild(fill);
    var vs=document.createElement('span');vs.className='bar-val';vs.textContent=val;
    var ws=document.createElement('span');ws.className='bar-word';ws.textContent=readDim(val,k);
    row.appendChild(lbl);row.appendChild(bg);row.appendChild(vs);row.appendChild(ws);
    el.appendChild(row);
  }
}

function renderStructs(){
  var el=document.getElementById('structs');while(el.firstChild)el.removeChild(el.firstChild);
  if(!lastResult||!lastResult.structs.length){var sp=document.createElement('span');sp.style.color='#444';sp.style.fontSize='11px';sp.textContent='none';el.appendChild(sp);return;}
  lastResult.structs.forEach(function(s){
    var t=document.createElement('span');t.style.display='inline-block';t.style.padding='2px 8px';t.style.margin='1px';t.style.borderRadius='3px';t.style.fontSize='11px';t.style.borderLeft='3px solid';
    if(s.type==='crisis'){t.style.borderColor='#f44336';t.style.background='#1a0505';t.style.color='#e57373'}
    else if(s.type==='sarcasm'){t.style.borderColor='#ff9800';t.style.background='#1a0f05';t.style.color='#ffcc80'}
    else{t.style.borderColor='#555';t.style.background='#111';t.style.color='#999'}
    t.textContent=s.pattern+' '+Math.round(s.conf*100)+'%';el.appendChild(t);
  });
}

function renderChips(){
  var el=document.getElementById('chips');while(el.firstChild)el.removeChild(el.firstChild);
  if(!lastResult)return;
  lastResult.roles.forEach(function(r){
    var c=document.createElement('span');c.style.padding='2px 6px';c.style.borderRadius='3px';c.style.fontSize='11px';
    var st=CHIP_STYLES[r.role]||CHIP_STYLES.NEUTRAL;
    if(r.role==='EMOTIONAL'&&r.force&&r.force[0]>0){c.style.background='#0d1528';c.style.color='#42a5f5'}
    else{c.style.background=st[0];c.style.color=st[1]}
    c.textContent=r.word;el.appendChild(c);
  });
}

function addLog(speaker,text,result){
  convoLog.push({speaker:speaker,text:text,vadug:result?result.vadug:null,structs:result?result.structs:[]});
  var el=document.getElementById('log');while(el.firstChild)el.removeChild(el.firstChild);
  convoLog.forEach(function(e){
    var row=document.createElement('div');row.className='log-entry '+(e.speaker==='A'?'log-a':'log-b');
    // Message text
    var msg=document.createElement('span');msg.textContent=(e.speaker==='A'?'A: ':'B: ')+e.text;
    row.appendChild(msg);
    // VADUG tag
    if(e.vadug){
      var tag=document.createElement('span');
      tag.style.cssText='margin-left:8px;font-size:10px;opacity:0.7;';
      var emotion=readEmotion(e.vadug.v);
      tag.style.color=valenceColor(e.vadug.v);
      var tagText='V='+e.vadug.v+' '+emotion;
      // Add structure names
      if(e.structs&&e.structs.length>0){
        tagText+=' ['+e.structs.map(function(s){return s.pattern}).join(', ')+']';
      }
      tag.textContent=tagText;
      row.appendChild(tag);
    }
    el.appendChild(row);
  });
  el.scrollTop=el.scrollHeight;
}

function onInput(speaker){
  var inputEl=document.getElementById(speaker==='A'?'inputA':'inputB');
  var text=inputEl.value.trim();
  var receiver=speaker==='A'?stateB:stateA;
  if(!text){
    receiver.tgt={v:receiver.base.v,a:receiver.base.a,d:receiver.base.d,u:receiver.base.u,g:receiver.base.g};
    lastResult=null;renderStructs();renderChips();return;
  }
  var r=computeVADUG(text);
  lastResult=r;lastSpeaker=speaker;
  var bw=0.15;
  receiver.tgt={
    v:r.vadug.v*(1-bw)+receiver.base.v*bw,
    a:r.vadug.a*(1-bw)+receiver.base.a*bw,
    d:r.vadug.d*(1-bw)+receiver.base.d*bw,
    u:r.vadug.u,
    g:r.vadug.g*(1-bw)+receiver.base.g*bw
  };
  var bl=0.08;
  receiver.base.v=lerp(receiver.base.v,r.vadug.v,bl);
  receiver.base.a=lerp(receiver.base.a,r.vadug.a,bl*0.5);
  receiver.base.d=lerp(receiver.base.d,r.vadug.d,bl);
  receiver.base.g=lerp(receiver.base.g,r.vadug.g,bl);
  receiver.history.push({v:r.vadug.v,g:r.vadug.g});
  if(receiver.history.length>15)receiver.history.shift();
  renderStructs();renderChips();
}

function submitMessage(speaker){
  var inputEl=document.getElementById(speaker==='A'?'inputA':'inputB');
  var text=inputEl.value.trim();
  if(!text)return;
  // Compute VADUG first so we can tag the log entry
  var r=computeVADUG(text);
  addLog(speaker,text,r);
  lastResult=r;lastSpeaker=speaker;
  // Apply to receiver
  var receiver=speaker==='A'?stateB:stateA;
  var bw=0.15;
  receiver.tgt={v:r.vadug.v*(1-bw)+receiver.base.v*bw,a:r.vadug.a*(1-bw)+receiver.base.a*bw,d:r.vadug.d*(1-bw)+receiver.base.d*bw,u:r.vadug.u,g:r.vadug.g*(1-bw)+receiver.base.g*bw};
  var bl=0.08;
  receiver.base.v=lerp(receiver.base.v,r.vadug.v,bl);
  receiver.base.a=lerp(receiver.base.a,r.vadug.a,bl*0.5);
  receiver.base.d=lerp(receiver.base.d,r.vadug.d,bl);
  receiver.base.g=lerp(receiver.base.g,r.vadug.g,bl);
  receiver.history.push({v:r.vadug.v,g:r.vadug.g});
  if(receiver.history.length>15)receiver.history.shift();
  renderStructs();renderChips();
  recordInteraction(charA,charB,r.vadug);
  renderRelInfo();
  inputEl.value='';
}

// --- SPEECH BUBBLES ---
function drawBubble(ctx,text,dir,opacity){
  opacity=opacity||0.9;
  if(text.length>40)text=text.substring(0,37)+'...';
  ctx.save();
  ctx.globalAlpha=opacity;
  ctx.font='11px Courier New';
  var tw=ctx.measureText(text).width;
  var bw=Math.min(tw+16,280),bh=24;
  var bx=dir==='right'?310-bw:10;
  var by=10;
  // Bubble body
  ctx.fillStyle='rgba(30,30,30,0.85)';
  ctx.strokeStyle='rgba(100,100,100,0.4)';ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(bx+4,by);ctx.lineTo(bx+bw-4,by);ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+4);
  ctx.lineTo(bx+bw,by+bh-4);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-4,by+bh);
  ctx.lineTo(bx+4,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-4);
  ctx.lineTo(bx,by+4);ctx.quadraticCurveTo(bx,by,bx+4,by);
  ctx.fill();ctx.stroke();
  // Tail pointing toward other person
  ctx.beginPath();
  if(dir==='right'){
    ctx.moveTo(bx+bw-8,by+bh);ctx.lineTo(bx+bw+6,by+bh+10);ctx.lineTo(bx+bw-20,by+bh);
  } else {
    ctx.moveTo(bx+8,by+bh);ctx.lineTo(bx-6,by+bh+10);ctx.lineTo(bx+20,by+bh);
  }
  ctx.fillStyle='rgba(30,30,30,0.85)';ctx.fill();
  // Text
  ctx.fillStyle='rgba(220,220,220,0.9)';
  ctx.fillText(text,bx+8,by+16);
  ctx.restore();
}

// --- ANIMATION ---
var ctxA=document.getElementById('canvasA').getContext('2d');
var ctxB=document.getElementById('canvasB').getContext('2d');

function frame(){
  time+=0.016;
  var sp=0.04;
  ['v','a','d','u','g'].forEach(function(k){
    stateA.cur[k]=lerp(stateA.cur[k],stateA.tgt[k],sp);
    stateB.cur[k]=lerp(stateB.cur[k],stateB.tgt[k],sp);
  });
  updateRag(ragA,stateA,0);updateRag(ragB,stateB,2.3);
  ctxA.clearRect(0,0,320,340);ctxB.clearRect(0,0,320,340);
  var confA=CHARACTERS.find(function(c){return c.id===charA})||CHARACTERS[0];
  var confB=CHARACTERS.find(function(c){return c.id===charB})||CHARACTERS[1];
  pulseA=drawRag(ctxA,ragA,stateA,pulseA,false,confA);
  pulseB=drawRag(ctxB,ragB,stateB,pulseB,true,confB);
  // Draw speech bubbles for last messages
  if(convoLog.length>0){
    var last=convoLog[convoLog.length-1];
    drawBubble(last.speaker==='A'?ctxA:ctxB,last.text,last.speaker==='A'?'right':'left');
  }
  if(convoLog.length>1){
    var prev=convoLog[convoLog.length-2];
    drawBubble(prev.speaker==='A'?ctxA:ctxB,prev.text,prev.speaker==='A'?'right':'left',0.4);
  }
  renderBars('barsA',stateA);renderBars('barsB',stateB);
  // Emotion labels
  var eA=document.getElementById('emotionA'),eB=document.getElementById('emotionB');
  eA.textContent=readEmotion(Math.round(stateA.cur.v));eA.style.color=valenceColor(Math.round(stateA.cur.v));
  eB.textContent=readEmotion(Math.round(stateB.cur.v));eB.style.color=valenceColor(Math.round(stateB.cur.v));
  requestAnimationFrame(frame);
}

loadData().then(function(){
  renderCharButtons();
  renderRelInfo();
  // Load relationship baseline
  var relBase=getRelBaseline(charA,charB);
  stateA.base=Object.assign({},relBase);stateA.cur=Object.assign({},relBase);stateA.tgt=Object.assign({},relBase);
  stateB.base=Object.assign({},relBase);stateB.cur=Object.assign({},relBase);stateB.tgt=Object.assign({},relBase);
  var iA=document.getElementById('inputA'),iB=document.getElementById('inputB');
  iA.addEventListener('input',function(){onInput('A')});
  iB.addEventListener('input',function(){onInput('B')});
  iA.addEventListener('keydown',function(e){if(e.key==='Enter'){submitMessage('A');iB.focus()}});
  iB.addEventListener('keydown',function(e){if(e.key==='Enter'){submitMessage('B');iA.focus()}});
  frame();
});
</script>
