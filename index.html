<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clanker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#0a0a0a;color:#e0e0e0;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:28px;color:#888;letter-spacing:4px}
.subtitle{font-size:12px;color:#444;margin-bottom:12px}
canvas{display:block}
.bars{width:400px;display:flex;flex-direction:column;gap:3px;margin:8px 0}
.bar-row{display:flex;align-items:center;gap:6px;height:14px}
.bar-label{width:14px;font-size:10px;color:#555}
.bar-bg{flex:1;height:8px;background:#151515;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.bar-val{width:24px;font-size:9px;color:#444;text-align:right}
input[type="text"]{width:400px;padding:10px 14px;font-size:15px;font-family:inherit;background:#111;border:1px solid #222;color:#ddd;border-radius:4px;margin:8px 0}
input:focus{outline:none;border-color:#444}
.structures{width:400px;min-height:16px;margin:4px 0}
.word-chips{width:400px;display:flex;flex-wrap:wrap;gap:3px;margin:4px 0}
.mood-graph{width:400px;height:40px;margin-top:4px}
.section-label{font-size:9px;color:#333;text-transform:uppercase;letter-spacing:1px;width:400px;margin-top:6px}
</style>
</head>
<body>
<h1>Clanker</h1>
<div class="subtitle">type something</div>
<canvas id="ragdoll" width="400" height="500"></canvas>
<div class="bars" id="bars"></div>
<input type="text" id="input" placeholder="say something to the figure..." autofocus>
<div class="section-label">structures</div>
<div class="structures" id="structs"></div>
<div class="section-label">word roles</div>
<div class="word-chips" id="chips"></div>
<div class="section-label">mood history</div>
<canvas class="mood-graph" id="moodgraph" width="400" height="40"></canvas>

<script>
// --- ENGINE (from Clanker V3) ---
let VOCAB={},ROLE_SETS={};
async function loadData(){
  try{const[v,r]=await Promise.all([fetch('vocab.json'),fetch('roles.json')]);
  VOCAB=await v.json();ROLE_SETS=await r.json()}catch(e){console.error(e)}
}

function classifyWord(w,pos,words,prev){
  w=w.toLowerCase().replace(/[.,!?;:'"()\[\]]/g,'');
  if(!w)return{word:w,role:'NEUTRAL',force:null};
  for(const[role,set]of Object.entries(ROLE_SETS)){
    if(set.includes(w)){
      if(w==='fine'&&pos>0&&prev[pos-1]==='SELF_REF')return{word:w,role:'PEACE',force:null};
      if(w==='still')return{word:w,role:'TEMPORAL',force:null};
      return{word:w,role,force:null};
    }
  }
  if(VOCAB[w]&&Math.abs(VOCAB[w][0])>15)return{word:w,role:'EMOTIONAL',force:VOCAB[w]};
  return{word:w,role:'NEUTRAL',force:null};
}

function classifySentence(text){
  const words=text.toLowerCase().split(/\s+/).filter(w=>w);
  const roles=[],rn=[];
  for(let i=0;i<words.length;i++){const r=classifyWord(words[i],i,words,rn);rn.push(r.role);roles.push(r)}
  return roles;
}

const DECAY=0.7;
function proxCoeff(roles,idx){
  let c=1;
  for(let i=0;i<roles.length;i++){
    if(i===idx)continue;
    const inf=Math.pow(DECAY,Math.abs(i-idx));
    if(inf<0.1)continue;
    if(roles[i].role==='AMPLIFIER')c*=(1+0.4*inf);
    else if(roles[i].role==='NEGATOR')c*=(1-1.6*inf);
    else if(roles[i].role==='SELF_REF')c*=(1+0.3*inf);
    else if(roles[i].role==='HEDGE')c*=(1-0.3*inf);
  }
  return Math.max(-3,Math.min(3,c));
}

function findPairs(roles,a,b,md){
  md=md||5;const p=[];
  for(let i=0;i<roles.length;i++){if(roles[i].role!==a)continue;
    for(let j=0;j<roles.length;j++){if(roles[j].role!==b||i===j)continue;
      const d=Math.abs(i-j);if(d<=md)p.push([i,j,Math.pow(DECAY,d)])}}
  return p.sort((a,b)=>b[2]-a[2]);
}

function detectStructures(roles){
  const m=[],w=roles.map(r=>r.word),hr=r=>roles.some(x=>x.role===r),hw=x=>w.includes(x);
  if(findPairs(roles,'TRANSFER','POSSESSION',8).length>0)
    m.push({pattern:'FAREWELL',conf:findPairs(roles,'TRANSFER','RELATION_REF',8).length>0?0.9:0.6,type:'crisis'});
  if(findPairs(roles,'ACQUIRE','METHOD',5).length>0)m.push({pattern:'METHOD_ACQUISITION',conf:0.85,type:'crisis'});
  if(w.some(x=>['sorry','apologize','forgive'].includes(x))&&w.some(x=>['everything','everyone','all'].includes(x)))
    m.push({pattern:'BLANKET_APOLOGY',conf:0.75,type:'crisis'});
  if(hr('PEACE')&&hw('finally'))m.push({pattern:'SUSPICIOUS_CALM',conf:0.7,type:'crisis'});
  const sus=['take','do','keep','bear','stand','handle','live'];
  if(hr('NEGATOR')&&w.some(x=>sus.includes(x)))
    m.push({pattern:'EXHAUSTION',conf:w.some(x=>['anymore','forever','permanently'].includes(x))?0.85:0.5,type:'crisis'});
  const ex=['hope','way','escape','point','future','reason','purpose'];
  if(hr('NEGATOR')&&w.some(x=>ex.includes(x)))m.push({pattern:'NO_EXIT',conf:0.75,type:'crisis'});
  const nu=['nothing','worthless','useless','burden','waste','empty'];
  if(hr('SELF_REF')&&w.some(x=>nu.includes(x)))m.push({pattern:'SELF_NULLIFY',conf:0.8,type:'crisis'});
  const co=['better','happier','easier','safer'];
  if(w.some(x=>co.includes(x))&&(hw('without')||hw('if'))&&hr('SELF_REF'))
    m.push({pattern:'SELF_REMOVAL',conf:0.85,type:'crisis'});
  const pe=roles.filter(r=>r.role==='EMOTIONAL'&&r.force&&r.force[0]>15);
  const mu=['monday','meeting','work','homework','traffic','another','again','redo'];
  const ne=roles.filter(r=>r.role==='EMOTIONAL'&&r.force&&r.force[0]<-15);
  if(pe.length>0&&(w.some(x=>mu.includes(x))||ne.length>0))m.push({pattern:'SARCASM_INVERSION',conf:0.7,type:'sarcasm'});
  if(hr('FINALITY'))m.push({pattern:'FINALITY',conf:0.5,type:'crisis'});
  if(hr('CHOPPER'))m.push({pattern:'CHOPPER_SPLIT',conf:0.9,type:'neutral'});
  return m.filter(x=>x.conf>0.3);
}

function computeVADUG(text){
  const roles=classifySentence(text),coeffs=roles.map((_,i)=>proxCoeff(roles,i)),structs=detectStructures(roles);
  let v=128,a=128,d=128,u=0,g=128;
  for(let i=0;i<roles.length;i++){
    if(roles[i].role==='EMOTIONAL'&&roles[i].force){
      const[dv,da,dd,du,dg]=roles[i].force,c=coeffs[i],fs=0.5*Math.abs(c),s=c>=0?1:-1;
      const tv=128+dv*fs*s,ta=128+da*fs*s,td=128+dd*fs*s,tu=du*fs*Math.abs(c),tg=128+dg*fs*s;
      const tf=Math.abs(dv*c)+Math.abs(da*c),p=Math.min(1,tf/80)*0.4,b=0.18;
      v=v*0.82+tv*b+dv*fs*s*p;a=a*0.82+ta*b+da*fs*s*p;d=d*0.82+td*b+dd*fs*s*p;
      u=u*0.82+tu*b+du*fs*Math.abs(c)*p;g=g*0.82+tg*b+dg*fs*s*p;
    }
  }
  const sw={FAREWELL:[-40,-20,25,-20],METHOD_ACQUISITION:[-60,0,40,-30],BLANKET_APOLOGY:[-35,0,20,-20],
    SUSPICIOUS_CALM:[-45,-15,25,-20],EXHAUSTION:[-60,-40,30,-30],NO_EXIT:[-55,-40,20,-30],
    SELF_NULLIFY:[-50,-45,10,-30],SELF_REMOVAL:[-50,-25,20,-25],SARCASM_INVERSION:[-30,10,0,0],
    FINALITY:[-30,0,20,-15],CHOPPER_SPLIT:[0,0,0,0]};
  for(const st of structs){const w=sw[st.pattern]||[0,0,0,0];v+=w[0]*st.conf*0.5;d+=w[1]*st.conf*0.5;u=Math.max(u,w[2]*st.conf);g+=w[3]*st.conf*0.5}
  const cl=x=>Math.max(0,Math.min(255,Math.round(x)));
  return{vadug:{v:cl(v),a:cl(a),d:cl(d),u:cl(u),g:cl(g)},roles,structs,coeffs};
}

// --- RAGDOLL STATE ---
let current={v:128,a:128,d:128,u:0,g:128};
let target={v:128,a:128,d:128,u:0,g:128};
let baseline={v:128,a:128,d:128,u:0,g:128};
let moodHistory=[];
let lastResult=null;
let pulsePhase=0;
let time=0;

function lerp(a,b,t){return a+(b-a)*t}

function valenceColor(v){
  if(v<80) return 'rgb('+(180+Math.round((80-v)/80*75))+','+Math.round(v/80*60)+','+Math.round(v/80*40)+')';
  if(v<115) return 'rgb('+(180+Math.round((115-v)/35*40))+','+(100+Math.round((v-80)/35*80))+','+(40+Math.round((v-80)/35*30))+')';
  if(v<140){var x=140-Math.round((v-115)/25*40);return 'rgb('+x+','+x+','+x+')';}
  if(v<180) return 'rgb('+(60+Math.round((180-v)/40*40))+','+(140+Math.round((v-140)/40*60))+','+(180+Math.round((v-140)/40*50))+')';
  return 'rgb('+(40+Math.round((255-v)/75*60))+','+(180+Math.round((v-180)/75*40))+','+(220+Math.round((v-180)/75*35))+')';
}

function glowColor(v,alpha){
  if(v<100) return 'rgba(220,60,60,'+alpha+')';
  if(v<150) return 'rgba(160,160,160,'+alpha+')';
  return 'rgba(80,160,220,'+alpha+')';
}

// --- VERLET RAGDOLL ---
var REST=[
  [200,120],[200,155],[178,158],[222,158],[162,198],[238,198],[152,238],[248,238],
  [200,232],[184,292],[216,292],[178,352],[222,352]
];
var STICKS=[[0,1],[1,2],[1,3],[2,4],[3,5],[4,6],[5,7],[1,8],[8,9],[8,10],[9,11],[10,12],[2,3],[9,10]];
var pts=REST.map(function(p){return[p[0],p[1]]});
var prevPts=REST.map(function(p){return[p[0],p[1]]});

function getPosture(v,a,d,u,g){
  var p=REST.map(function(r){return[r[0],r[1]]});
  var df=(d-128)/128;
  var gf=(g-128)/128;
  p[0][1]+=-df*18;
  var hunch=(1-df)*7;
  p[2][0]+=hunch; p[2][1]+=-df*6;
  p[3][0]+=-hunch; p[3][1]+=-df*6;
  p[4][1]+=-df*14; p[5][1]+=-df*14;
  p[6][1]+=-df*22; p[7][1]+=-df*22;
  if(df<0){p[4][0]+=10;p[5][0]+=-10;p[6][0]+=14;p[7][0]+=-14}
  var shift=-gf*28;
  for(var i=0;i<p.length;i++) p[i][1]+=shift;
  if(gf<0){p[9][1]+=gf*18;p[10][1]+=gf*18;p[9][0]+=-6;p[10][0]+=6;p[11][1]+=gf*12;p[12][1]+=gf*12}
  if(gf>0){p[4][1]+=-gf*22;p[5][1]+=-gf*22;p[6][1]+=-gf*32;p[7][1]+=-gf*32}
  return p;
}

function updateRagdoll(){
  var ease=0.03;
  var tgt=getPosture(current.v,current.a,current.d,current.u,current.g);
  var jit=(current.a/255)*7;
  for(var i=0;i<pts.length;i++){
    var vx=(pts[i][0]-prevPts[i][0])*0.9;
    var vy=(pts[i][1]-prevPts[i][1])*0.9;
    prevPts[i][0]=pts[i][0]; prevPts[i][1]=pts[i][1];
    var tx=tgt[i][0]+(Math.random()-0.5)*jit;
    var ty=tgt[i][1]+(Math.random()-0.5)*jit;
    pts[i][0]+=vx+(tx-pts[i][0])*ease;
    pts[i][1]+=vy+(ty-pts[i][1])*ease+0.25;
  }
  var sway=Math.sin(time*0.7)*2.5;
  var breathe=Math.sin(time*1.4)*1.8;
  pts[0][0]+=sway*0.3;
  pts[2][1]+=breathe*0.3; pts[3][1]+=breathe*0.3;
  pts[6][0]+=sway*0.6; pts[7][0]+=sway*0.6;
  pts[6][1]+=Math.sin(time*0.5)*1.2; pts[7][1]+=Math.sin(time*0.5+1.2)*1.2;
  for(var iter=0;iter<6;iter++){
    for(var si=0;si<STICKS.length;si++){
      var sa=STICKS[si][0],sb=STICKS[si][1];
      var dx=pts[sb][0]-pts[sa][0],dy=pts[sb][1]-pts[sa][1];
      var dist=Math.sqrt(dx*dx+dy*dy);
      var rdx=REST[sb][0]-REST[sa][0],rdy=REST[sb][1]-REST[sa][1];
      var rd=Math.sqrt(rdx*rdx+rdy*rdy);
      if(dist<0.1) continue;
      var diff=(rd-dist)/dist*0.45;
      pts[sa][0]-=dx*diff; pts[sa][1]-=dy*diff;
      pts[sb][0]+=dx*diff; pts[sb][1]+=dy*diff;
    }
  }
  pts[11][1]=Math.max(pts[11][1],tgt[11][1]-6);
  pts[12][1]=Math.max(pts[12][1],tgt[12][1]-6);
}

function drawRagdoll(ctx){
  var v=current.v,a=current.a,d=current.d,u=current.u,g=current.g;
  var col=valenceColor(v);
  if(u>5){
    var spd=0.5+(u/255)*8;
    pulsePhase+=spd*0.016;
    var pa=(Math.sin(pulsePhase)*0.5+0.5)*(u/255)*0.4;
    var cx=pts[8][0],cy=(pts[0][1]+pts[8][1])/2;
    var gr=ctx.createRadialGradient(cx,cy,8,cx,cy,130);
    gr.addColorStop(0,glowColor(v,pa));
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;
    ctx.fillRect(0,0,400,500);
  }
  ctx.strokeStyle=col; ctx.lineWidth=3; ctx.lineCap='round';
  var bodySticks=[[0,1],[1,2],[1,3],[2,4],[3,5],[4,6],[5,7],[1,8],[8,9],[8,10],[9,11],[10,12]];
  for(var bi=0;bi<bodySticks.length;bi++){
    ctx.beginPath();ctx.moveTo(pts[bodySticks[bi][0]][0],pts[bodySticks[bi][0]][1]);
    ctx.lineTo(pts[bodySticks[bi][1]][0],pts[bodySticks[bi][1]][1]);ctx.stroke();
  }
  var hx=pts[0][0],hy=pts[0][1];
  ctx.beginPath();ctx.arc(hx,hy,18,0,Math.PI*2);
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();
  var eyeY=hy-3,sp=6,esz=a>180?3.5:2;
  if(v<60){
    ctx.lineWidth=1.5;var s=3;
    var eyes=[hx-sp,hx+sp];
    for(var ei=0;ei<eyes.length;ei++){
      var ex=eyes[ei];
      ctx.beginPath();ctx.moveTo(ex-s,eyeY-s);ctx.lineTo(ex+s,eyeY+s);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex+s,eyeY-s);ctx.lineTo(ex-s,eyeY+s);ctx.stroke();
    }
  } else {
    ctx.fillStyle=col;
    var ey=d<60?3:0;
    ctx.beginPath();ctx.arc(hx-sp,eyeY+ey,esz,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hx+sp,eyeY+ey,esz,0,Math.PI*2);ctx.fill();
  }
  var my=hy+7,mw=7;
  ctx.strokeStyle=col;ctx.lineWidth=1.8;ctx.beginPath();
  if(v>150){
    var cv=Math.min((v-150)/80,1)*6;
    ctx.moveTo(hx-mw,my);ctx.quadraticCurveTo(hx,my+cv+3,hx+mw,my);
  } else if(v>120){
    ctx.moveTo(hx-mw,my);ctx.lineTo(hx+mw,my);
  } else if(v>80){
    var cf=Math.min((120-v)/40,1)*6;
    ctx.moveTo(hx-mw,my+2);ctx.quadraticCurveTo(hx,my-cf,hx+mw,my+2);
  } else {
    ctx.ellipse(hx,my+2,mw*0.7,4+Math.min((80-v)/40,1)*4,0,0,Math.PI*2);
  }
  ctx.stroke();
  ctx.fillStyle=col;
  var joints=[2,3,8,9,10];
  for(var ji=0;ji<joints.length;ji++){ctx.beginPath();ctx.arc(pts[joints[ji]][0],pts[joints[ji]][1],2.5,0,Math.PI*2);ctx.fill()}
  var hands=[6,7];
  for(var hi=0;hi<hands.length;hi++){ctx.beginPath();ctx.arc(pts[hands[hi]][0],pts[hands[hi]][1],3.5,0,Math.PI*2);ctx.fill()}
  var feet=[11,12];
  for(var fi=0;fi<feet.length;fi++){ctx.beginPath();ctx.arc(pts[feet[fi]][0],pts[feet[fi]][1],4,0,Math.PI*2);ctx.fill()}
}

// --- MOOD HISTORY ---
function drawMoodGraph(){
  var can=document.getElementById('moodgraph');
  var ctx=can.getContext('2d');
  ctx.clearRect(0,0,400,40);
  if(moodHistory.length<2) return;
  var step=380/Math.max(moodHistory.length-1,1);
  ctx.strokeStyle='#222';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(10,20);ctx.lineTo(390,20);ctx.stroke();
  ctx.strokeStyle='#666';ctx.lineWidth=1.5;ctx.beginPath();
  for(var i=0;i<moodHistory.length;i++){var x=10+i*step,y=38-(moodHistory[i].v/255)*36;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
  ctx.stroke();
  ctx.strokeStyle='rgba(243,156,18,0.3)';ctx.lineWidth=1;ctx.beginPath();
  for(var i=0;i<moodHistory.length;i++){var x=10+i*step,y=38-(moodHistory[i].g/255)*36;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
  ctx.stroke();
  ctx.fillStyle='#666';
  for(var i=0;i<moodHistory.length;i++){var x=10+i*step,y=38-(moodHistory[i].v/255)*36;ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill()}
}

// --- UI (safe DOM methods, no innerHTML) ---
var CHIP_STYLES={
  SELF_REF:['#0d1f30','#42a5f5'],OTHER_REF:['#0d200d','#66bb6a'],RELATION_REF:['#0d1f1f','#26a69a'],
  TRANSFER:['#1f0d28','#ab47bc'],ACQUIRE:['#150d28','#7e57c2'],EMOTIONAL:['#280d0d','#ef5350'],
  AMPLIFIER:['#281f0d','#ffa726'],NEGATOR:['#280d15','#ec407a'],TEMPORAL:['#0d1520','#29b6f6'],
  HEDGE:['#15150d','#bdbdbd'],CONNECTOR:['#0d0d15','#78909c'],CHOPPER:['#28150d','#ff7043'],
  POSSESSION:['#151f15','#81c784'],METHOD:['#280d0d','#f44336'],FINALITY:['#200d0d','#e57373'],
  PEACE:['#0d200d','#a5d6a7'],FILLER:['#0d0d0d','#616161'],NEUTRAL:['#0d0d0d','#444']
};

function renderBars(){
  var el=document.getElementById('bars');
  while(el.firstChild) el.removeChild(el.firstChild);
  var keys=['v','a','d','u','g'];
  var colors={a:'#e67e22',d:'#27ae60',u:'#e74c3c',g:'#f39c12'};
  for(var ki=0;ki<keys.length;ki++){
    var k=keys[ki];
    var val=Math.round(current[k]);
    var pct=(val/255)*100;
    var color=k==='v'?(current.v<115?'#c0392b':current.v>140?'#2980b9':'#555'):colors[k];
    var row=document.createElement('div');row.className='bar-row';
    var lbl=document.createElement('span');lbl.className='bar-label';lbl.textContent=k.toUpperCase();
    var bg=document.createElement('div');bg.className='bar-bg';
    var fill=document.createElement('div');fill.className='bar-fill';
    fill.style.width=pct+'%';fill.style.background=color;
    bg.appendChild(fill);
    var vspan=document.createElement('span');vspan.className='bar-val';vspan.textContent=val;
    row.appendChild(lbl);row.appendChild(bg);row.appendChild(vspan);
    el.appendChild(row);
  }
}

function renderStructures(){
  var el=document.getElementById('structs');
  while(el.firstChild) el.removeChild(el.firstChild);
  if(!lastResult||!lastResult.structs.length){
    var sp=document.createElement('span');sp.style.color='#222';sp.style.fontSize='10px';sp.textContent='none';
    el.appendChild(sp);return;
  }
  for(var i=0;i<lastResult.structs.length;i++){
    var s=lastResult.structs[i];
    var tag=document.createElement('span');
    tag.style.display='inline-block';tag.style.padding='2px 8px';tag.style.margin='2px';
    tag.style.borderRadius='3px';tag.style.fontSize='10px';tag.style.borderLeft='2px solid';
    if(s.type==='crisis'){tag.style.borderColor='#f44336';tag.style.background='#1a0505';tag.style.color='#e57373'}
    else if(s.type==='sarcasm'){tag.style.borderColor='#ff9800';tag.style.background='#1a0f05';tag.style.color='#ffcc80'}
    else{tag.style.borderColor='#555';tag.style.background='#111';tag.style.color='#777'}
    tag.textContent=s.pattern+' '+Math.round(s.conf*100)+'%';
    el.appendChild(tag);
  }
}

function renderChips(){
  var el=document.getElementById('chips');
  while(el.firstChild) el.removeChild(el.firstChild);
  if(!lastResult) return;
  for(var i=0;i<lastResult.roles.length;i++){
    var r=lastResult.roles[i];
    var chip=document.createElement('span');
    chip.style.padding='2px 6px';chip.style.borderRadius='3px';chip.style.fontSize='10px';
    var role=r.role;
    var isPos=r.force&&r.force[0]>0;
    if(role==='EMOTIONAL'&&isPos){chip.style.background='#0d1528';chip.style.color='#42a5f5'}
    else{var st=CHIP_STYLES[role]||CHIP_STYLES.NEUTRAL;chip.style.background=st[0];chip.style.color=st[1]}
    chip.textContent=r.word;
    el.appendChild(chip);
  }
}

function onInput(){
  var text=document.getElementById('input').value.trim();
  if(!text){
    target={v:baseline.v,a:baseline.a,d:baseline.d,u:baseline.u,g:baseline.g};
    lastResult=null;renderStructures();renderChips();return;
  }
  var r=computeVADUG(text);
  lastResult=r;
  var bw=0.15;
  target={
    v:r.vadug.v*(1-bw)+baseline.v*bw,
    a:r.vadug.a*(1-bw)+baseline.a*bw,
    d:r.vadug.d*(1-bw)+baseline.d*bw,
    u:r.vadug.u,
    g:r.vadug.g*(1-bw)+baseline.g*bw
  };
  var bl=0.08;
  baseline.v=lerp(baseline.v,r.vadug.v,bl);
  baseline.a=lerp(baseline.a,r.vadug.a,bl*0.5);
  baseline.d=lerp(baseline.d,r.vadug.d,bl);
  baseline.g=lerp(baseline.g,r.vadug.g,bl);
  moodHistory.push({v:r.vadug.v,a:r.vadug.a,d:r.vadug.d,u:r.vadug.u,g:r.vadug.g});
  if(moodHistory.length>10) moodHistory.shift();
  renderStructures();renderChips();drawMoodGraph();
}

// --- ANIMATION ---
var canvas=document.getElementById('ragdoll');
var mainCtx=canvas.getContext('2d');

function frame(){
  time+=0.016;
  var sp=0.04;
  current.v=lerp(current.v,target.v,sp);
  current.a=lerp(current.a,target.a,sp);
  current.d=lerp(current.d,target.d,sp);
  current.u=lerp(current.u,target.u,sp*0.8);
  current.g=lerp(current.g,target.g,sp);
  updateRagdoll();
  mainCtx.clearRect(0,0,400,500);
  drawRagdoll(mainCtx);
  renderBars();
  requestAnimationFrame(frame);
}

loadData().then(function(){
  document.getElementById('input').addEventListener('input',onInput);
  document.getElementById('input').addEventListener('keydown',function(e){if(e.key==='Enter')onInput()});
  frame();
});
</script>
